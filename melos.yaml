name: orbitsync

packages:
  - .
  - examples/**

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: melos exec -- "flutter analyze ."
    description: Analyze the OrbitSync package and examples.
  format:
    run: dart format --set-exit-if-changed lib test examples benchmarks
    description: Check Dart formatting.
  test:
    run: flutter test
    description: Run OrbitSync unit tests.
  server:test:
    run: npm test --prefix server_mock
    description: Run mock server tests.
