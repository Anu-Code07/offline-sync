name: orbitsync_workspace
description: OrbitSync monorepo workspace for Flutter offline-first synchronization packages.
publish_to: none
environment:
  sdk: ">=3.5.0 <4.0.0"

workspace:
  - packages/sync_core
  - packages/sync_storage
  - packages/sync_realtime
  - packages/sync_crdt
  - packages/sync_flutter
  - packages/sync_devtools
  - examples/todo_app
  - examples/chat_app
  - examples/collaborative_notes_app
  - examples/expense_tracker

dev_dependencies:
  melos: any
